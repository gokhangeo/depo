<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
        
        input[type="color"] { -webkit-appearance: none; border: none; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen overflow-hidden flex flex-col md:flex-row relative selection:bg-blue-500/30">

    <div id="toast-container" class="fixed top-4 right-4 z-[80] flex flex-col gap-2 pointer-events-none"></div>

    <!-- GİRİŞ VE KAYIT EKRANI -->
    <div id="login-screen" class="fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 p-8 rounded-2xl max-w-md w-full shadow-xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-blue-400"></div>
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-100">
                    <i class="ph-duotone ph-fingerprint text-4xl text-blue-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Pro Workspace</h2>
                <p class="text-slate-500 text-sm">Çalışma alanınıza güvenle erişin.</p>
            </div>
            
            <div class="flex flex-col gap-4 mb-4">
                <div class="relative">
                    <i class="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" id="auth-email" placeholder="E-posta Adresiniz" class="w-full bg-slate-50 border border-slate-200 text-slate-800 pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition-colors">
                </div>
                <div class="relative">
                    <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="auth-pass" placeholder="Şifreniz" class="w-full bg-slate-50 border border-slate-200 text-slate-800 pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition-colors">
                </div>
            </div>

            <!-- BENİ HATIRLA -->
            <div class="flex items-center gap-2 mb-6 px-1" id="remember-me-container">
                <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer" checked>
                <label for="remember-me" class="text-sm text-slate-600 cursor-pointer select-none">Beni Hatırla</label>
            </div>

            <div class="flex flex-col gap-3">
                <button id="btn-login" onclick="loginWithEmail()" class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-md shadow-blue-500/20">
                    Giriş Yap
                </button>
                <button id="btn-register" onclick="registerWithEmail()" class="w-full py-3 px-4 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold rounded-xl transition-all hidden">
                    Hesap Oluştur
                </button>
            </div>

            <div class="mt-6 text-center text-sm text-slate-500">
                <span id="auth-toggle-text">Hesabınız yok mu?</span>
                <button onclick="toggleAuthMode()" class="text-blue-600 hover:text-blue-700 font-bold ml-1 transition-colors" id="auth-toggle-btn">Kayıt Ol</button>
            </div>
        </div>
    </div>

    <!-- NOT DÜZENLEME PENCERESİ -->
    <div id="note-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 sm:p-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeNoteModal()"></div>
        <div class="bg-white border border-slate-200 rounded-2xl w-full max-w-4xl flex flex-col shadow-2xl relative z-10 h-full max-h-[90vh] animate-[slideIn_0.2s_ease-out]">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-2xl">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i class="ph-duotone ph-notebook text-blue-500 text-xl"></i> Belge Düzenle
                </h3>
                <button onclick="closeNoteModal()" class="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-slate-200 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            
            <div class="p-4 md:p-6 flex flex-col gap-5 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Belge Başlığı</label>
                        <input type="text" id="modal-title-input" placeholder="Örn: Haftalık Toplantı Özeti" class="w-full bg-slate-50 border border-slate-200 text-slate-800 px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition-colors font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Klasör</label>
                        <input type="text" id="modal-folder-input" placeholder="Genel" list="folder-datalist" class="w-full bg-slate-50 border border-slate-200 text-slate-800 px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition-colors">
                        <datalist id="folder-datalist"></datalist>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Etiket Rengi</label>
                        <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 p-2 rounded-xl">
                            <input type="color" id="modal-color-input" value="#3b82f6" class="w-8 h-8 rounded-lg cursor-pointer">
                            <span class="text-sm text-slate-600">Belgeyi renklendirin</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Son Tarih / Uyarı</label>
                        <div class="relative">
                            <i class="ph ph-calendar-blank absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="date" id="modal-date-input" class="w-full bg-slate-50 border border-slate-200 text-slate-800 pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition-colors">
                        </div>
                    </div>
                </div>

                <div class="flex-1 flex flex-col pt-4 border-t border-slate-100 h-full min-h-[300px]">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">İçerik</label>
                    <textarea id="modal-text-editor" placeholder="Notlarınızı buraya yazın..." class="w-full h-full flex-1 bg-slate-50 border border-slate-200 text-slate-800 px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white resize-none leading-relaxed transition-colors"></textarea>
                </div>
            </div>

            <div class="p-4 border-t border-slate-100 bg-slate-50/50 rounded-b-2xl flex justify-end gap-3 shrink-0">
                <button onclick="closeNoteModal()" class="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-200 font-medium transition-colors">İptal</button>
                <button onclick="saveNoteFromModal()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium shadow-md shadow-blue-500/20 transition-all flex items-center gap-2">
                    <i class="ph ph-floppy-disk text-lg"></i> Kaydet
                </button>
            </div>
        </div>
    </div>

    <!-- MOBİL ÜST BAR -->
    <div class="md:hidden bg-white border-b border-slate-200 p-3 flex items-center justify-between shrink-0 z-40 relative">
        <div class="flex items-center gap-3">
            <button id="menu-btn" class="p-2 bg-slate-100 rounded-lg text-slate-600 hover:text-slate-900 transition-colors">
                <i class="ph ph-list text-xl"></i>
            </button>
            <div class="font-bold text-lg text-slate-800 flex items-center gap-2">
                <i class="ph-duotone ph-folders text-blue-500"></i> Pro
            </div>
        </div>
        <button id="mobile-new-btn" class="p-2 bg-blue-600 text-white rounded-lg flex items-center gap-1 text-sm font-medium shadow-md shadow-blue-500/20">
            <i class="ph ph-plus text-lg"></i>
        </button>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden backdrop-blur-sm"></div>

    <!-- SOL MENÜ -->
    <aside id="sidebar" class="sidebar-closed absolute md:relative z-50 w-4/5 max-w-xs md:w-80 h-full bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-2xl md:shadow-none">
        <div class="hidden md:flex p-4 border-b border-slate-100 items-center justify-between bg-slate-50/50">
            <div class="flex items-center gap-2 text-slate-800">
                <i class="ph-duotone ph-folders text-3xl text-blue-500"></i>
                <h1 class="font-bold text-xl tracking-tight">Workspace</h1>
            </div>
            <button id="desktop-new-btn" class="p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all flex items-center justify-center shadow-md shadow-blue-500/20" title="Yeni Belge">
                <i class="ph ph-plus text-lg"></i>
            </button>
        </div>

        <div class="p-4 flex-1 overflow-y-auto overflow-x-hidden flex flex-col gap-4">
            <div id="document-list" class="flex flex-col gap-4">
                <!-- Klasörler ve Dosyalar buraya gelecek -->
            </div>
        </div>

        <div id="user-info" class="p-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between hidden">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shrink-0">
                    <i class="ph-fill ph-user font-bold"></i>
                </div>
                <div class="flex flex-col overflow-hidden">
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Hesap</span>
                    <span id="user-email" class="text-sm font-semibold text-slate-700 truncate"></span>
                </div>
            </div>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors shrink-0" title="Çıkış Yap">
                <i class="ph-bold ph-sign-out text-xl"></i>
            </button>
        </div>
    </aside>

    <!-- ANA İÇERİK -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative">
        <div class="p-3 md:p-4 border-b border-slate-200 bg-white/80 backdrop-blur-md flex flex-wrap gap-3 items-center justify-between z-10 shrink-0 sticky top-0">
            <div id="topbar-input-wrap" class="flex-1 min-w-[200px] flex gap-2">
                <input type="text" id="doc-name-input" placeholder="Dosya İsmi" class="w-full bg-white border border-slate-200 text-slate-800 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-500 transition-all text-sm font-medium shadow-sm">
                <input type="date" id="doc-date-input" title="Bitiş Tarihi" class="bg-white border border-slate-200 text-slate-600 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-500 transition-all text-sm shadow-sm hidden md:block">
                <input type="text" id="doc-folder-input" placeholder="Klasör" list="folder-datalist" class="bg-white border border-slate-200 text-slate-800 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-500 transition-all text-sm w-32 shadow-sm hidden md:block">
            </div>
            
            <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                <input type="file" id="file-input" class="hidden" accept="*/*">
                <button id="upload-btn" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 rounded-lg text-sm transition-colors font-medium shadow-sm">
                    <i class="ph ph-upload-simple text-lg"></i> Yükle
                </button>
                <button id="save-btn" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-md shadow-blue-500/20">
                    <i class="ph ph-floppy-disk text-lg"></i> Kaydet
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-8" id="editor-container"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const a1 = "AIzaSy"; const a2 = "CDtjM2"; const a3 = "BxrUL5";
        const a4 = "XXNi4i"; const a5 = "OLkkKC"; const a6 = "683cAzQcI";
        const secretKey = a1 + a2 + a3 + a4 + a5 + a6;

        let firebaseConfig = {
            apiKey: secretKey,
            authDomain: "depolama-1270b.firebaseapp.com",
            projectId: "depolama-1270b",
            storageBucket: "depolama-1270b.firebasestorage.app",
            messagingSenderId: "653327617266",
            appId: "1:653327617266:web:4e080f3d75b87dff89546b"
        };

        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch(e) {}
        }

        const app_id = typeof __app_id !== 'undefined' ? __app_id : 'text-manager-pro-html';
        
        let app, auth, db;
        let isFirebaseReady = false;

        if (firebaseConfig.apiKey && firebaseConfig.apiKey.startsWith("AIza")) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            isFirebaseReady = true;
        }

        let state = {
            documents: [],
            activeDoc: null,
            form: { name: '', content: '', fileType: 'text/plain', folder: 'Genel', color: '#3b82f6', dueDate: '' },
            isSaving: false,
            user: null,
            isLoginMode: true,
            expandedFolders: {} // Klasörlerin açık/kapalı durumu
        };

        const els = {
            menuBtn: document.getElementById('menu-btn'), sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('sidebar-overlay'), docList: document.getElementById('document-list'),
            docNameInput: document.getElementById('doc-name-input'), topbarInputWrap: document.getElementById('topbar-input-wrap'),
            uploadBtn: document.getElementById('upload-btn'), fileInput: document.getElementById('file-input'),
            saveBtn: document.getElementById('save-btn'), editorContainer: document.getElementById('editor-container'),
            mobileNewBtn: document.getElementById('mobile-new-btn'), desktopNewBtn: document.getElementById('desktop-new-btn'),
            toastContainer: document.getElementById('toast-container'), noteModal: document.getElementById('note-modal'),
            modalTitleInput: document.getElementById('modal-title-input'), modalTextEditor: document.getElementById('modal-text-editor'),
            modalFolderInput: document.getElementById('modal-folder-input'), modalColorInput: document.getElementById('modal-color-input'),
            modalDateInput: document.getElementById('modal-date-input'), folderDatalist: document.getElementById('folder-datalist'),
            loginScreen: document.getElementById('login-screen'), userInfo: document.getElementById('user-info'),
            userEmail: document.getElementById('user-email'),
            docFolderInput: document.getElementById('doc-folder-input'), docDateInput: document.getElementById('doc-date-input'),
            rememberMe: document.getElementById('remember-me'), rememberContainer: document.getElementById('remember-me-container')
        };

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200';
            const icon = type === 'error' ? 'ph-warning-circle' : 'ph-check-circle';
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg pointer-events-auto ${colors}`;
            toast.innerHTML = `<i class="ph-fill ${icon} text-xl"></i><span class="text-sm font-semibold">${message}</span>`;
            els.toastContainer.appendChild(toast);
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function toggleSidebar(forceClose = false) {
            const isOpen = !els.sidebar.classList.contains('sidebar-closed');
            if (isOpen || forceClose) {
                els.sidebar.classList.add('sidebar-closed'); els.overlay.classList.add('hidden');
            } else {
                els.sidebar.classList.remove('sidebar-closed'); els.overlay.classList.remove('hidden');
            }
        }

        els.menuBtn.addEventListener('click', () => toggleSidebar());
        els.overlay.addEventListener('click', () => toggleSidebar(true));

        window.openNoteModal = function() {
            els.modalTitleInput.value = state.form.name || '';
            els.modalTextEditor.value = state.form.content || '';
            els.modalFolderInput.value = state.form.folder || 'Genel';
            els.modalColorInput.value = state.form.color || '#3b82f6';
            els.modalDateInput.value = state.form.dueDate || '';
            els.noteModal.classList.remove('hidden');
        };

        window.closeNoteModal = function() { els.noteModal.classList.add('hidden'); };

        window.saveNoteFromModal = async function() {
            const newName = els.modalTitleInput.value.trim();
            const newContent = els.modalTextEditor.value;

            if (!newName) return showToast("Lütfen bir başlık girin", "error");
            if (newContent.length > 800000) return showToast("Notunuz çok uzun", "error");

            state.form.name = newName;
            state.form.content = newContent;
            state.form.folder = els.modalFolderInput.value.trim() || 'Genel';
            state.form.color = els.modalColorInput.value || '#3b82f6';
            state.form.dueDate = els.modalDateInput.value;
            
            closeNoteModal();
            await performSave(); 
        };

        window.shareDoc = function() {
            if (!state.activeDoc) return;
            const isRealFile = state.form.content && state.form.content.startsWith('data:');
            const shareText = isRealFile ? "Dosya: " + state.form.name : state.form.content;

            if (navigator.share) {
                navigator.share({ title: state.form.name, text: shareText }).catch(err => {});
            } else {
                navigator.clipboard.writeText(shareText);
                showToast("Panoya kopyalandı!");
            }
        };

        // --- AUTH ---
        window.toggleAuthMode = function() {
            state.isLoginMode = !state.isLoginMode;
            document.getElementById('btn-login').classList.toggle('hidden', !state.isLoginMode);
            document.getElementById('btn-register').classList.toggle('hidden', state.isLoginMode);
            els.rememberContainer.classList.toggle('hidden', !state.isLoginMode);
            document.getElementById('auth-toggle-text').innerText = state.isLoginMode ? "Hesabınız yok mu?" : "Zaten hesabınız var mı?";
            document.getElementById('auth-toggle-btn').innerText = state.isLoginMode ? "Kayıt Ol" : "Giriş Yap";
        };

        window.loginWithEmail = async function() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const remember = els.rememberMe.checked;
            
            if (!email || !pass) return showToast("Bilgileri eksiksiz girin.", "error");
            
            try { 
                await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
                await signInWithEmailAndPassword(auth, email, pass); 
            } 
            catch (error) { showToast("Giriş başarısız. Bilgileri kontrol edin.", "error"); }
        };

        window.registerWithEmail = async function() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if (!email || !pass) return showToast("Bilgileri eksiksiz girin.", "error");
            if (pass.length < 6) return showToast("Şifre en az 6 karakter olmalı.", "error");
            try { 
                await setPersistence(auth, browserLocalPersistence); // Kayıtta otomatik hatırla
                await createUserWithEmailAndPassword(auth, email, pass); 
            } 
            catch (error) { showToast("Kayıt olunamadı.", "error"); }
        };

        window.logout = async function() {
            if(confirm("Çıkış yapmak istediğinize emin misiniz?")) {
                await signOut(auth);
                state.documents = []; state.activeDoc = null;
                document.getElementById('auth-email').value = '';
                document.getElementById('auth-pass').value = '';
                renderSidebar(); renderMain();
            }
        };

        if (isFirebaseReady) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    state.user = user;
                    els.loginScreen.classList.add('hidden');
                    if(user.email) { els.userEmail.innerText = user.email; els.userInfo.classList.remove('hidden'); }
                    loadDocuments();
                } else {
                    state.user = null;
                    els.userInfo.classList.add('hidden');
                    els.loginScreen.classList.remove('hidden');
                }
            });
        }

        function loadDocuments() {
            if (!isFirebaseReady || !state.user) return;
            const docsRef = collection(db, 'artifacts', app_id, 'users', state.user.uid, 'text_data');
            onSnapshot(docsRef, (snapshot) => {
                state.documents = [];
                snapshot.forEach((doc) => state.documents.push({ id: doc.id, ...doc.data() }));
                state.documents.sort((a, b) => b.updatedAt - a.updatedAt);
                updateFoldersDatalist();
                renderSidebar();
            });
        }

        function updateFoldersDatalist() {
            const folders = new Set();
            state.documents.forEach(d => { if(d.folder) folders.add(d.folder); });
            els.folderDatalist.innerHTML = Array.from(folders).map(f => `<option value="${f}">`).join('');
        }

        function handleNew() {
            state.activeDoc = null;
            state.form = { name: '', content: '', fileType: 'text/plain', folder: 'Genel', color: '#3b82f6', dueDate: '' };
            renderMain(); toggleSidebar(true); openNoteModal(); 
        }

        els.mobileNewBtn.addEventListener('click', handleNew);
        els.desktopNewBtn.addEventListener('click', handleNew);

        window.selectDoc = function(id) {
            const docData = state.documents.find(d => d.id === id);
            if (docData) {
                state.activeDoc = docData;
                state.form = { 
                    name: docData.name, content: docData.content || '', fileType: docData.fileType || 'text/plain',
                    folder: docData.folder || 'Genel', color: docData.color || '#3b82f6', dueDate: docData.dueDate || ''
                };
                renderMain(); renderSidebar(); toggleSidebar(true);
            }
        };

        window.deleteDoc = async function(id, event) {
            event.stopPropagation();
            if (!confirm("Kalıcı olarak silinecek, emin misiniz?")) return;
            if (!state.user) return;
            try {
                await deleteDoc(doc(db, 'artifacts', app_id, 'users', state.user.uid, 'text_data', id));
                if (state.activeDoc && state.activeDoc.id === id) {
                    state.activeDoc = null; state.form = { name: '', content: '', fileType: 'text/plain', folder:'Genel' };
                    renderMain();
                }
                showToast("Silindi");
            } catch (error) { showToast("Silinemedi", "error"); }
        };

        async function performSave() {
            if (!state.form.name) return showToast("Lütfen isim verin", "error");
            if (!state.user) return;

            state.isSaving = true;
            const origHtml = els.saveBtn.innerHTML;
            els.saveBtn.innerHTML = '<i class="ph-animate ph-spinner-gap text-lg"></i>';
            
            try {
                const documentId = state.activeDoc ? state.activeDoc.id : crypto.randomUUID();
                const docRef = doc(db, 'artifacts', app_id, 'users', state.user.uid, 'text_data', documentId);
                
                const saveData = {
                    name: state.form.name,
                    fileType: state.form.fileType,
                    content: state.form.content,
                    folder: state.form.folder || 'Genel',
                    color: state.form.color || '#3b82f6',
                    dueDate: state.form.dueDate || '',
                    updatedAt: Date.now()
                };
                
                await setDoc(docRef, saveData);
                showToast("Kaydedildi");
                
                // Kaydettikten sonra aktif klasörü açık tut
                state.expandedFolders[saveData.folder] = true;
                
                state.activeDoc = null;
                renderMain();

            } catch (error) { showToast("Kaydedilemedi", "error"); } 
            finally { state.isSaving = false; els.saveBtn.innerHTML = origHtml; }
        }

        els.saveBtn.addEventListener('click', () => {
            state.form.name = els.docNameInput.value.trim();
            state.form.folder = els.docFolderInput.value.trim() || 'Genel';
            state.form.dueDate = els.docDateInput.value;
            performSave();
        });

        els.uploadBtn.addEventListener('click', () => els.fileInput.click());
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 800 * 1024) return showToast("Maksimum 800KB.", "error");

            const isText = file.type === 'text/plain' || file.name.endsWith('.txt');
            const reader = new FileReader();

            reader.onload = (evt) => {
                state.form.name = file.name;
                state.form.content = evt.target.result;
                state.form.fileType = file.type || (isText ? 'text/plain' : 'application/octet-stream');
                state.form.folder = 'Yüklemeler';
                state.form.color = '#10b981'; // Green for uploads
                state.activeDoc = null; 
                renderMain();
                showToast("Dosya eklendi. Kaydet'e basın.");
            };

            isText ? reader.readAsText(file) : reader.readAsDataURL(file);
            e.target.value = '';
        });

        function getAlarmBadge(dateStr) {
            if (!dateStr) return '';
            const dueDate = new Date(dateStr).getTime();
            const now = new Date().getTime();
            const timeLeft = dueDate - now;
            
            // Aynı gün içindeyse süresi dolmuş sayma, o gün bitince dolsun (opsiyonel mantık)
            if (timeLeft < -86400000) return `<i class="ph-fill ph-warning-circle text-red-500 text-lg animate-pulse" title="Süresi Geçti!"></i>`;
            if (timeLeft < 86400000 * 3) return `<i class="ph-fill ph-clock text-amber-500 text-lg" title="Son Tarih Yaklaştı"></i>`;
            return `<i class="ph-fill ph-calendar text-blue-500" title="Son Tarih: ${dateStr}"></i>`;
        }

        window.toggleFolder = function(folderName) {
            state.expandedFolders[folderName] = !state.expandedFolders[folderName];
            renderSidebar();
        }

        function renderSidebar() {
            if (!isFirebaseReady) return;

            if (state.documents.length === 0) {
                els.docList.innerHTML = `<div class="text-center p-6 border border-slate-200 border-dashed rounded-xl bg-slate-50"><i class="ph-duotone ph-file-dashed text-4xl text-slate-400 mb-2"></i><p class="text-sm text-slate-500">Alan boş.</p></div>`;
                return;
            }

            const groups = {};
            state.documents.forEach(doc => {
                const f = doc.folder || 'Genel';
                if(!groups[f]) groups[f] = [];
                groups[f].push(doc);
            });

            let html = '';
            for (const [folderName, docs] of Object.entries(groups)) {
                const isExpanded = state.expandedFolders[folderName] === true;
                
                html += `
                <div class="mb-2">
                    <button onclick="toggleFolder('${folderName.replace(/'/g, "\\'")}')" class="w-full flex items-center justify-between px-2 py-2 text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition-colors">
                        <div class="flex items-center gap-2">
                            <i class="ph-fill ${isExpanded ? 'ph-folder-open' : 'ph-folder'} text-blue-500 text-lg"></i>
                            <span class="text-xs font-bold uppercase tracking-wider">${folderName}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded-md font-bold">${docs.length}</span>
                            <i class="ph ${isExpanded ? 'ph-caret-down' : 'ph-caret-right'} text-slate-400"></i>
                        </div>
                    </button>
                    <div class="flex flex-col gap-1.5 mt-1 pl-3 border-l-2 border-slate-100 ml-4 ${isExpanded ? '' : 'hidden'}">
                `;
                
                docs.forEach(doc => {
                    const isActive = state.activeDoc && state.activeDoc.id === doc.id;
                    const isRealFile = doc.content && doc.content.startsWith('data:');
                    const icon = isRealFile ? 'ph-file-pdf' : 'ph-file-text';
                    const alarm = getAlarmBadge(doc.dueDate);
                    const docColor = doc.color || '#3b82f6';
                    
                    html += `
                    <div onclick="selectDoc('${doc.id}')" class="group flex items-center justify-between p-2.5 rounded-xl cursor-pointer transition-all border ${isActive ? 'bg-blue-50 border-blue-200 shadow-sm' : 'border-transparent hover:bg-slate-100'}">
                        <div class="flex items-center gap-3 overflow-hidden flex-1">
                            <div class="w-2 h-8 rounded-full shrink-0" style="background-color: ${docColor}"></div>
                            <div class="flex flex-col overflow-hidden">
                                <span class="truncate font-semibold text-sm ${isActive ? 'text-blue-800' : 'text-slate-700'}">${doc.name}</span>
                                ${doc.dueDate ? `<span class="text-[10px] font-medium text-slate-500 truncate">${doc.dueDate}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            ${alarm}
                            <button onclick="deleteDoc('${doc.id}', event)" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100 hidden md:block">
                                <i class="ph-fill ph-trash"></i>
                            </button>
                        </div>
                    </div>`;
                });
                
                html += `</div></div>`;
            }
            els.docList.innerHTML = html;
        }

        function renderMain() {
            els.docNameInput.value = state.form.name;
            els.docFolderInput.value = state.form.folder || '';
            els.docDateInput.value = state.form.dueDate || '';

            const isRealFile = state.form.content && state.form.content.startsWith('data:');
            
            if (!isRealFile) {
                els.topbarInputWrap.classList.add('hidden');
                els.saveBtn.classList.add('hidden');
                
                if (!state.activeDoc && !state.form.content) {
                    els.editorContainer.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center text-slate-500 py-10">
                            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6 shadow-inner border border-blue-100">
                                <i class="ph-duotone ph-rocket text-5xl text-blue-500"></i>
                            </div>
                            <h2 class="text-xl font-bold text-slate-800 mb-2">Çalışma Alanı Hazır</h2>
                            <p class="text-sm mb-6 text-center max-w-sm text-slate-500">Evraklarınızı renklendirin, klasörleyin ve tarih vererek takibini kolaylaştırın.</p>
                            <button onclick="handleNew()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl shadow-md shadow-blue-500/20 font-bold transition-all hover:-translate-y-1">
                                Yeni Belge Oluştur
                            </button>
                        </div>
                    `;
                    return;
                }

                els.editorContainer.innerHTML = `
                    <div class="max-w-3xl mx-auto h-auto min-h-[300px] flex flex-col bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1.5" style="background-color: ${state.form.color || '#3b82f6'}"></div>
                        
                        <div class="flex justify-between items-start md:items-center mb-6 border-b border-slate-100 pb-6 gap-4 flex-col md:flex-row">
                            <div class="flex flex-col gap-1">
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-500 flex items-center gap-1">
                                    <i class="ph-fill ph-folder text-blue-500"></i> ${state.form.folder || 'Genel'}
                                </span>
                                <h2 class="text-2xl font-bold text-slate-800">${state.form.name || 'İsimsiz'}</h2>
                                ${state.form.dueDate ? `<span class="text-sm font-semibold text-amber-600 flex items-center gap-1 mt-1"><i class="ph-fill ph-clock"></i> Son Tarih: ${state.form.dueDate}</span>` : ''}
                            </div>
                            <div class="flex items-center gap-2 w-full md:w-auto">
                                <button onclick="shareDoc()" class="flex-1 md:flex-none p-2.5 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-xl text-slate-700 transition-all">
                                    <i class="ph-bold ph-share-network text-lg"></i>
                                </button>
                                <button onclick="openNoteModal()" class="flex-1 md:flex-none px-5 py-2.5 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm text-white flex items-center justify-center gap-2 font-bold shadow-md shadow-blue-500/20 transition-all">
                                    <i class="ph-bold ph-pencil-simple text-lg"></i> Düzenle
                                </button>
                            </div>
                        </div>
                        <div class="flex-1 text-slate-700 whitespace-pre-wrap font-sans text-base leading-relaxed break-words">
                            ${state.form.content || '<span class="text-slate-400 italic">Boş belge.</span>'}
                        </div>
                    </div>
                `;
            } else {
                els.topbarInputWrap.classList.remove('hidden');
                els.saveBtn.classList.remove('hidden');

                let previewHtml = '';
                if (state.form.fileType === 'application/pdf') {
                    previewHtml = `<iframe src="${state.form.content}" class="w-full h-[50vh] md:h-full rounded-2xl bg-white border border-slate-200 shadow-lg"></iframe>`;
                } else if (state.form.fileType.startsWith('image/')) {
                    previewHtml = `<div class="w-full h-full flex items-center justify-center bg-slate-100 rounded-2xl border border-slate-200 p-4 shadow-inner"><img src="${state.form.content}" class="max-w-full max-h-[50vh] md:max-h-full object-contain rounded-lg"></div>`;
                } else {
                    previewHtml = `<div class="h-full flex flex-col items-center justify-center text-slate-500 bg-slate-50 rounded-2xl border border-slate-200 p-8 text-center min-h-[300px]">
                        <i class="ph-duotone ph-file-dashed text-6xl mb-4 opacity-50 text-slate-400"></i><p class="font-medium text-slate-600">Önizleme Desteklenmiyor</p>
                    </div>`;
                }

                els.editorContainer.innerHTML = `
                    <div class="max-w-5xl mx-auto h-auto flex flex-col lg:flex-row gap-6 w-full">
                        <div class="w-full lg:w-80 flex flex-col items-center justify-center border border-slate-200 rounded-2xl bg-white p-8 shrink-0 h-fit shadow-xl relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1.5" style="background-color: ${state.form.color || '#10b981'}"></div>
                            <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 border border-slate-200">
                               <i class="ph-duotone ph-file-text text-4xl" style="color: ${state.form.color || '#10b981'}"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2 text-center break-all">${state.form.name || 'İsimsiz Dosya'}</h3>
                            <span class="text-xs font-bold uppercase text-slate-600 mb-6 bg-slate-100 border border-slate-200 px-3 py-1 rounded-full">${state.form.folder || 'Genel'}</span>
                            
                            <div class="flex flex-col gap-3 w-full">
                                <button onclick="shareDoc()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-white hover:bg-slate-50 text-slate-700 rounded-xl transition-all font-bold border border-slate-200 shadow-sm">
                                    <i class="ph-bold ph-share-network text-lg"></i> Paylaş
                                </button>
                                <a href="${state.form.content}" download="${state.form.name}" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all shadow-md shadow-blue-500/20 font-bold">
                                   <i class="ph-bold ph-download-simple text-lg"></i> Cihaza İndir
                                </a>
                            </div>
                        </div>
                        <div class="flex-1">${previewHtml}</div>
                    </div>
                `;
            }
        }
        renderMain(); 
    </script>
</body>
</html>
