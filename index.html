<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dosya Yöneticisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        body { -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-screen overflow-hidden flex flex-col md:flex-row relative">

    <div id="toast-container" class="fixed top-4 right-4 z-[80] flex flex-col gap-2 pointer-events-none"></div>

    <!-- GİRİŞ VE KAYIT EKRANI -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-md w-full text-center shadow-2xl">
            <i class="ph ph-cloud-arrow-up text-6xl text-blue-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Pro Dosya</h2>
            <p class="text-slate-400 mb-6 text-sm">Dosyalarınıza her cihazdan ulaşmak için hesabınızla giriş yapın veya kayıt olun.</p>
            
            <div class="flex flex-col gap-3 mb-6">
                <input type="email" id="auth-email" placeholder="E-posta Adresiniz" class="w-full bg-slate-950 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors">
                <input type="password" id="auth-pass" placeholder="Şifreniz" class="w-full bg-slate-950 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <div class="flex gap-3">
                <button onclick="loginWithEmail()" class="flex-1 py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-colors shadow-lg shadow-blue-500/20">
                    Giriş Yap
                </button>
                <button onclick="registerWithEmail()" class="flex-1 py-3 px-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-colors border border-slate-700">
                    Kayıt Ol
                </button>
            </div>
        </div>
    </div>

    <!-- NOT DÜZENLEME PENCERESİ -->
    <div id="note-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeNoteModal()"></div>
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-2xl flex flex-col shadow-2xl relative z-10 max-h-[90vh] animate-[slideIn_0.2s_ease-out]">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/50 rounded-t-2xl">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="ph ph-pencil-simple text-blue-400"></i> Not Düzenle
                </h3>
                <button onclick="closeNoteModal()" class="text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-4 md:p-6 flex flex-col gap-4 overflow-y-auto">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Başlık</label>
                    <input type="text" id="modal-title-input" placeholder="Örn: Haftalık Rapor" class="w-full bg-slate-950 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 font-medium transition-colors">
                </div>
                <div class="flex-1 flex flex-col">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">İçerik</label>
                    <textarea id="modal-text-editor" placeholder="Notlarınızı buraya yazmaya başlayın..." class="w-full min-h-[250px] bg-slate-950 border border-slate-700 text-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 resize-none leading-relaxed transition-colors"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-slate-800 bg-slate-800/20 rounded-b-2xl flex justify-end gap-3">
                <button onclick="closeNoteModal()" class="px-5 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition-colors">İptal</button>
                <button onclick="saveNoteFromModal()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-medium shadow-lg shadow-blue-500/20 transition-all flex items-center gap-2">
                    <i class="ph ph-floppy-disk text-lg"></i> Kaydet
                </button>
            </div>
        </div>
    </div>

    <!-- MOBİL ÜST BAR -->
    <div class="md:hidden bg-slate-900 border-b border-slate-800 p-4 flex items-center justify-between shrink-0 z-40 relative">
        <div class="flex items-center gap-3">
            <button id="menu-btn" class="p-1.5 bg-slate-800 rounded-lg text-slate-300 hover:text-white">
                <i class="ph ph-list text-xl"></i>
            </button>
            <div class="font-bold text-lg text-blue-400 flex items-center gap-2">
                <i class="ph ph-folder-notch-open"></i> Pro Dosya
            </div>
        </div>
        <button id="mobile-new-btn" class="p-2 bg-blue-600 text-white rounded-lg flex items-center gap-1 text-sm font-medium shadow-lg shadow-blue-500/20">
            <i class="ph ph-plus"></i> Yeni Not
        </button>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <!-- SOL MENÜ -->
    <aside id="sidebar" class="sidebar-closed absolute md:relative z-50 w-3/4 max-w-sm md:w-80 h-full bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 shadow-2xl md:shadow-none">
        <div class="hidden md:flex p-4 border-b border-slate-800 items-center justify-between">
            <div class="flex items-center gap-2 text-blue-400">
                <i class="ph ph-folder-notch-open text-2xl"></i>
                <h1 class="font-bold text-lg">Pro Dosya</h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="desktop-new-btn" class="p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-all flex items-center gap-1 text-sm font-medium shadow-lg shadow-blue-500/20">
                    <i class="ph ph-plus"></i> Yeni
                </button>
                <button onclick="logout()" class="p-2 bg-slate-800 hover:bg-red-500/20 text-slate-300 hover:text-red-400 rounded-lg transition-colors" title="Çıkış Yap">
                    <i class="ph ph-sign-out text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Kullanıcı Bilgisi -->
        <div id="user-info" class="p-3 mx-4 mt-4 bg-slate-800/50 rounded-xl text-xs text-slate-400 flex items-center gap-2 border border-slate-700/50 hidden">
            <div class="w-6 h-6 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
                <i class="ph ph-user"></i>
            </div>
            <span id="user-email" class="truncate font-medium"></span>
        </div>

        <div class="p-4 flex-1 overflow-y-auto flex flex-col gap-2">
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Belgeleriniz</h2>
            <div id="document-list" class="flex flex-col gap-2"></div>
        </div>
    </aside>

    <!-- ANA İÇERİK -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-950 relative">
        <div class="p-3 md:p-4 border-b border-slate-800 bg-slate-900/50 flex flex-wrap gap-3 items-center justify-between z-10 shrink-0">
            <div id="topbar-input-wrap" class="flex-1 min-w-[150px]">
                <input type="text" id="doc-name-input" placeholder="Dosya İsmi (Örn: Rapor)" class="w-full bg-slate-950 border border-slate-700 text-white px-3 py-2 md:px-4 md:py-2 rounded-lg focus:outline-none focus:border-blue-500 transition-all font-medium text-sm md:text-base">
            </div>
            
            <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                <input type="file" id="file-input" class="hidden" accept="*/*">
                <button id="upload-btn" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 md:py-2.5 bg-slate-800 text-slate-300 rounded-lg text-sm transition-colors hover:bg-slate-700 font-medium">
                    <i class="ph ph-upload-simple text-lg"></i> Dosya Yükle
                </button>
                <button id="save-btn" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-2 md:py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium transition-colors hover:bg-emerald-500 active:bg-emerald-700 shadow-lg shadow-emerald-500/20">
                    <i class="ph ph-floppy-disk text-lg"></i> Kaydet
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto overflow-x-hidden p-3 md:p-6" id="editor-container"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =========================================================================
        const a1 = "AIzaSy";
        const a2 = "CDtjM2";
        const a3 = "BxrUL5";
        const a4 = "XXNi4i";
        const a5 = "OLkkKC";
        const a6 = "683cAzQcI";
        const secretKey = a1 + a2 + a3 + a4 + a5 + a6;

        let firebaseConfig = {
            apiKey: secretKey,
            authDomain: "depolama-1270b.firebaseapp.com",
            databaseURL: "https://depolama-1270b-default-rtdb.firebaseio.com",
            projectId: "depolama-1270b",
            storageBucket: "depolama-1270b.firebasestorage.app",
            messagingSenderId: "653327617266",
            appId: "1:653327617266:web:4e080f3d75b87dff89546b"
        };

        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch(e) {}
        }

        const app_id = typeof __app_id !== 'undefined' ? __app_id : 'text-manager-pro-html';
        
        let app, auth, db;
        let isFirebaseReady = false;

        if (firebaseConfig.apiKey && firebaseConfig.apiKey.startsWith("AIza")) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            isFirebaseReady = true;
        }

        let state = {
            user: null,
            documents: [],
            activeDoc: null,
            form: { name: '', content: '', fileType: 'text/plain' },
            isSaving: false
        };

        const els = {
            menuBtn: document.getElementById('menu-btn'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('sidebar-overlay'),
            docList: document.getElementById('document-list'),
            docNameInput: document.getElementById('doc-name-input'),
            topbarInputWrap: document.getElementById('topbar-input-wrap'),
            uploadBtn: document.getElementById('upload-btn'),
            fileInput: document.getElementById('file-input'),
            saveBtn: document.getElementById('save-btn'),
            editorContainer: document.getElementById('editor-container'),
            mobileNewBtn: document.getElementById('mobile-new-btn'),
            desktopNewBtn: document.getElementById('desktop-new-btn'),
            toastContainer: document.getElementById('toast-container'),
            noteModal: document.getElementById('note-modal'),
            modalTitleInput: document.getElementById('modal-title-input'),
            modalTextEditor: document.getElementById('modal-text-editor'),
            loginScreen: document.getElementById('login-screen'),
            userInfo: document.getElementById('user-info'),
            userEmail: document.getElementById('user-email')
        };

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-red-500/10 border border-red-500/50 text-red-400' : 'bg-emerald-500/10 border border-emerald-500/50 text-emerald-400';
            const icon = type === 'error' ? 'ph-warning-circle' : 'ph-check-circle';
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg backdrop-blur-md pointer-events-auto ${colors}`;
            toast.innerHTML = `<i class="ph ${icon} text-xl"></i><span class="text-sm font-medium">${message}</span>`;
            els.toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleSidebar(forceClose = false) {
            const isOpen = !els.sidebar.classList.contains('sidebar-closed');
            if (isOpen || forceClose) {
                els.sidebar.classList.add('sidebar-closed');
                els.overlay.classList.add('hidden');
            } else {
                els.sidebar.classList.remove('sidebar-closed');
                els.overlay.classList.remove('hidden');
            }
        }

        els.menuBtn.addEventListener('click', () => toggleSidebar());
        els.overlay.addEventListener('click', () => toggleSidebar(true));

        window.openNoteModal = function() {
            els.modalTitleInput.value = state.form.name || '';
            els.modalTextEditor.value = state.form.content || '';
            els.noteModal.classList.remove('hidden');
        };

        window.closeNoteModal = function() {
            els.noteModal.classList.add('hidden');
        };

        window.saveNoteFromModal = async function() {
            if (!state.user) return;
            const newName = els.modalTitleInput.value.trim();
            const newContent = els.modalTextEditor.value;

            if (!newName) return showToast("Lütfen bir başlık girin", "error");
            if (newContent.length > 800000) return showToast("Notunuz çok uzun (Maks ~800KB)", "error");

            state.form.name = newName;
            state.form.content = newContent;
            
            closeNoteModal();
            renderMain(); 
            await performSave(); 
        };

        // --- E-POSTA VE ŞİFRE İLE GİRİŞ / KAYIT ---
        window.loginWithEmail = async function() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            
            if (!email || !pass) return showToast("Lütfen E-posta ve şifrenizi girin.", "error");

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showToast("Giriş başarılı");
            } catch (error) {
                showToast("Hatalı giriş. Şifre veya e-posta yanlış.", "error");
            }
        };

        window.registerWithEmail = async function() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if (!email || !pass) return showToast("Lütfen E-posta ve şifrenizi girin.", "error");
            if (pass.length < 6) return showToast("Şifreniz en az 6 karakter olmalı.", "error");

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                showToast("Kayıt başarılı, giriş yapıldı.");
            } catch (error) {
                showToast("Kayıt olunamadı. Bu e-posta zaten kullanılıyor olabilir.", "error");
            }
        };

        window.logout = async function() {
            if(confirm("Çıkış yapmak istediğinize emin misiniz?")) {
                await signOut(auth);
                state.documents = [];
                state.activeDoc = null;
                els.userInfo.classList.add('hidden');
                document.getElementById('auth-email').value = '';
                document.getElementById('auth-pass').value = '';
                renderSidebar();
                renderMain();
                showToast("Çıkış yapıldı");
            }
        };

        if (isFirebaseReady) {
            onAuthStateChanged(auth, (user) => {
                state.user = user;
                if (user) {
                    els.loginScreen.classList.add('hidden');
                    
                    if(user.email) {
                        els.userEmail.innerText = user.email;
                        els.userInfo.classList.remove('hidden');
                    }
                    
                    loadDocuments();
                } else {
                    els.loginScreen.classList.remove('hidden');
                }
            });
        }

        function loadDocuments() {
            if (!state.user || !isFirebaseReady) return;
            const docsRef = collection(db, 'artifacts', app_id, 'users', state.user.uid, 'text_data');
            
            onSnapshot(docsRef, (snapshot) => {
                state.documents = [];
                snapshot.forEach((doc) => state.documents.push({ id: doc.id, ...doc.data() }));
                state.documents.sort((a, b) => b.updatedAt - a.updatedAt);
                renderSidebar();
            });
        }

        function handleNew() {
            state.activeDoc = null;
            state.form = { name: '', content: '', fileType: 'text/plain' };
            renderMain();
            toggleSidebar(true);
            openNoteModal(); 
        }

        els.mobileNewBtn.addEventListener('click', handleNew);
        els.desktopNewBtn.addEventListener('click', handleNew);

        window.selectDoc = function(id) {
            const docData = state.documents.find(d => d.id === id);
            if (docData) {
                state.activeDoc = docData;
                state.form = { name: docData.name, content: docData.content || '', fileType: docData.fileType || 'text/plain' };
                renderMain();
                renderSidebar();
                toggleSidebar(true);
            }
        };

        window.deleteDoc = async function(id, event) {
            event.stopPropagation();
            if (!state.user) return;
            if (!confirm("Bu öğeyi kalıcı olarak silmek istediğinize emin misiniz?")) return;
            
            try {
                await deleteDoc(doc(db, 'artifacts', app_id, 'users', state.user.uid, 'text_data', id));
                if (state.activeDoc && state.activeDoc.id === id) {
                    state.activeDoc = null;
                    state.form = { name: '', content: '', fileType: 'text/plain' };
                    renderMain();
                }
                showToast("Silme işlemi başarılı");
            } catch (error) {
                showToast("Silinemedi", "error");
            }
        };

        async function performSave() {
            if (!state.user) return;
            const nameVal = state.form.name;

            if (!nameVal) return showToast("Lütfen bir isim verin", "error");

            state.isSaving = true;
            const origHtml = els.saveBtn.innerHTML;
            els.saveBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i>';
            
            try {
                const documentId = state.activeDoc ? state.activeDoc.id : crypto.randomUUID();
                const docRef = doc(db, 'artifacts', app_id, 'users', state.user.uid, 'text_data', documentId);
                
                const saveData = {
                    name: nameVal,
                    fileType: state.form.fileType,
                    content: state.form.content,
                    updatedAt: Date.now()
                };
                
                await setDoc(docRef, saveData);
                showToast("Buluta başarıyla kaydedildi");
                
                if (!state.activeDoc) {
                    state.activeDoc = { id: documentId, ...saveData };
                    renderSidebar();
                }
            } catch (error) {
                showToast("Kaydedilemedi", "error");
            } finally {
                state.isSaving = false;
                els.saveBtn.innerHTML = origHtml;
            }
        }

        els.saveBtn.addEventListener('click', () => {
            state.form.name = els.docNameInput.value.trim();
            performSave();
        });

        els.uploadBtn.addEventListener('click', () => els.fileInput.click());
        
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 800 * 1024) {
                showToast("Dosya çok büyük. Maksimum 800KB.", "error");
                e.target.value = '';
                return;
            }

            const isText = file.type === 'text/plain' || file.name.endsWith('.txt');
            const reader = new FileReader();

            reader.onload = (evt) => {
                state.form.name = file.name;
                state.form.content = evt.target.result;
                state.form.fileType = file.type || (isText ? 'text/plain' : 'application/octet-stream');
                state.activeDoc = null; 
                renderMain();
                showToast("Dosya okundu. Buluta eklemek için kaydedin.");
            };

            if (isText) {
                reader.readAsText(file);
            } else {
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        function renderSidebar() {
            if (state.documents.length === 0) {
                els.docList.innerHTML = `
                    <div class="text-center p-6 border border-slate-800 border-dashed rounded-xl mt-4">
                        <i class="ph ph-file-dashed text-3xl text-slate-600 mb-2"></i>
                        <p class="text-sm text-slate-500">Henüz kayıt yok.</p>
                    </div>`;
                return;
            }

            els.docList.innerHTML = state.documents.map(doc => {
                const isActive = state.activeDoc && state.activeDoc.id === doc.id;
                const isRealFile = doc.content && doc.content.startsWith('data:');
                const icon = isRealFile ? 'ph-file-pdf' : 'ph-file-text';
                const iconColor = isRealFile ? 'text-emerald-400' : 'text-blue-400';
                
                return `
                <div onclick="selectDoc('${doc.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all border ${isActive ? 'bg-blue-900/20 border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.1)]' : 'bg-slate-800/30 border-slate-800 hover:bg-slate-800 hover:border-slate-700'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-lg bg-slate-950 flex items-center justify-center shrink-0 border border-slate-700/50">
                            <i class="ph ${icon} ${iconColor} text-lg"></i>
                        </div>
                        <span class="truncate font-medium text-sm text-slate-200">${doc.name}</span>
                    </div>
                    <button onclick="deleteDoc('${doc.id}', event)" class="p-2 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors md:opacity-0 md:group-hover:opacity-100">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
                `;
            }).join('');
        }

        function renderMain() {
            els.docNameInput.value = state.form.name;
            const isRealFile = state.form.content && state.form.content.startsWith('data:');
            
            if (!isRealFile) {
                els.topbarInputWrap.classList.add('hidden');
                els.saveBtn.classList.add('hidden');
                
                if (!state.activeDoc && !state.form.content) {
                    els.editorContainer.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center text-slate-500">
                            <i class="ph ph-cloud-arrow-up text-6xl mb-4 text-blue-500/30"></i>
                            <h2 class="text-xl font-medium text-slate-300 mb-2">Bulut Çalışma Alanı</h2>
                            <p class="text-sm mb-6 text-center max-w-sm">Sol menüden bir belge seçin veya buluta yüklemek için yeni bir not oluşturun.</p>
                            <button onclick="handleNew()" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-lg shadow-blue-500/20 font-medium transition-colors flex items-center gap-2">
                                <i class="ph ph-plus"></i> Yeni Not Oluştur
                            </button>
                        </div>
                    `;
                    return;
                }

                els.editorContainer.innerHTML = `
                    <div class="max-w-4xl mx-auto h-full flex flex-col bg-slate-900/40 border border-slate-800 rounded-2xl overflow-hidden shadow-inner p-5 md:p-8">
                        <div class="flex justify-between items-start md:items-center mb-6 border-b border-slate-800/50 pb-5 gap-4 flex-col md:flex-row">
                            <h2 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                                <div class="p-2 bg-blue-500/10 rounded-xl text-blue-400 border border-blue-500/20"><i class="ph ph-text-aa text-xl"></i></div>
                                ${state.form.name || 'İsimsiz Not'}
                            </h2>
                            <button onclick="openNoteModal()" class="w-full md:w-auto px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm text-white flex items-center justify-center gap-2 font-medium shadow-lg shadow-blue-500/20 transition-all shrink-0">
                                <i class="ph ph-pencil-simple text-lg"></i> Notu Düzenle
                            </button>
                        </div>
                        <div class="flex-1 overflow-y-auto text-slate-300 whitespace-pre-wrap font-sans text-base leading-relaxed pr-2">
                            ${state.form.content || '<span class="text-slate-500 italic">Bu not boş.</span>'}
                        </div>
                    </div>
                `;
            } else {
                els.topbarInputWrap.classList.remove('hidden');
                els.saveBtn.classList.remove('hidden');

                let previewHtml = '';
                
                if (state.form.fileType === 'application/pdf') {
                    previewHtml = `<iframe src="${state.form.content}" class="w-full h-[50vh] md:h-full rounded-xl bg-white border border-slate-800 shadow-xl"></iframe>`;
                } else if (state.form.fileType.startsWith('image/')) {
                    previewHtml = `<div class="w-full h-full flex items-center justify-center bg-slate-900/50 rounded-xl border border-slate-800 p-4 shadow-inner">
                        <img src="${state.form.content}" class="max-w-full max-h-[50vh] md:max-h-full object-contain rounded-lg shadow-lg">
                    </div>`;
                } else {
                    previewHtml = `<div class="h-full flex flex-col items-center justify-center text-slate-500 bg-slate-900/30 rounded-xl border border-slate-800 p-8 text-center">
                        <i class="ph ph-file-dashed text-6xl mb-4 opacity-30 text-emerald-400"></i>
                        <p class="font-medium text-slate-300 text-lg">Önizleme Desteklenmiyor</p>
                    </div>`;
                }

                els.editorContainer.innerHTML = `
                    <div class="h-full flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto w-full">
                        <div class="w-full lg:w-80 flex flex-col items-center justify-center border border-slate-800 rounded-2xl bg-slate-900/40 p-8 shrink-0 h-fit shadow-xl">
                            <div class="w-24 h-24 bg-emerald-500/10 rounded-full flex items-center justify-center mb-6 border border-emerald-500/20">
                               <i class="ph ph-download-simple text-5xl text-emerald-500"></i>
                            </div>
                            <h3 class="text-xl font-bold text-white mb-2 text-center break-all">${state.form.name || 'İsimsiz Dosya'}</h3>
                            <p class="text-sm text-slate-400 mb-8 text-center leading-relaxed">
                                Bu dosya bulut veritabanınızda güvenle saklanmaktadır.
                            </p>
                            <a href="${state.form.content}" download="${state.form.name}" class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl transition-all shadow-lg shadow-emerald-500/20 font-bold text-lg">
                               <i class="ph ph-download-simple text-xl"></i> Cihaza İndir
                            </a>
                        </div>
                        <div class="flex-1 min-h-[400px]">
                            ${previewHtml}
                        </div>
                    </div>
                `;
            }
        }

        renderMain(); 

    </script>
</body>
</html>
