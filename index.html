<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dosya Yöneticisi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Özelleştirilmiş Scrollbar ve Mobil İyileştirmeler */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Toast Animasyonu */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }

        /* Mobil Menü Geçişi */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) {
            .sidebar-closed { transform: translateX(0); } /* Masaüstünde hep açık */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Toast Bildirim Konteyneri -->
    <div id="toast-container" class="fixed top-4 right-4 z-[60] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Mobil Üst Bar (Sadece mobilde görünür) -->
    <div class="md:hidden bg-slate-900 border-b border-slate-800 p-4 flex items-center justify-between shrink-0 z-40">
        <div class="flex items-center gap-3">
            <button id="menu-btn" class="p-1.5 bg-slate-800 rounded-lg text-slate-300 hover:text-white">
                <i class="ph ph-list text-xl"></i>
            </button>
            <div class="font-bold text-lg text-blue-400 flex items-center gap-2">
                <i class="ph ph-folder-notch-open"></i> Pro Dosya
            </div>
        </div>
        <button id="mobile-new-btn" class="p-2 bg-blue-600 text-white rounded-lg flex items-center gap-1 text-sm font-medium">
            <i class="ph ph-plus"></i> Yeni
        </button>
    </div>

    <!-- Karartma Arka Plan (Sadece mobilde menü açıkken) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <!-- Sol Menü (Sidebar) -->
    <aside id="sidebar" class="sidebar-closed absolute md:relative z-50 w-3/4 max-w-sm md:w-80 h-full bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
        <div class="hidden md:flex p-4 border-b border-slate-800 items-center justify-between">
            <div class="flex items-center gap-2 text-blue-400">
                <i class="ph ph-folder-notch-open text-2xl"></i>
                <h1 class="font-bold text-lg">Pro Dosya</h1>
            </div>
            <button id="desktop-new-btn" class="p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors flex items-center gap-1 text-sm font-medium">
                <i class="ph ph-plus"></i> Yeni
            </button>
        </div>

        <div class="p-4 flex-1 overflow-y-auto flex flex-col gap-2">
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Belgeleriniz</h2>
            <div id="document-list" class="flex flex-col gap-2">
                <!-- Belgeler buraya JS ile yüklenecek -->
                <div class="text-center p-6 border border-slate-800 rounded-xl">
                    <i class="ph ph-spinner-gap animate-spin text-2xl text-blue-500 mb-2"></i>
                    <p class="text-sm text-slate-400">Yükleniyor...</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Ana İçerik Alanı -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-950 relative">
        
        <!-- Üst Kontrol Çubuğu -->
        <div class="p-3 md:p-4 border-b border-slate-800 bg-slate-900/50 flex flex-wrap gap-3 items-center justify-between z-10 shrink-0">
            <div class="flex-1 min-w-[150px]">
                <input type="text" id="doc-name-input" placeholder="Dosya İsmi (Örn: Rapor)" class="w-full bg-slate-950 border border-slate-700 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-lg focus:outline-none focus:border-blue-500 transition-all font-medium text-sm md:text-base">
            </div>
            
            <div class="flex items-center gap-2">
                <input type="file" id="file-input" class="hidden" accept="*/*">
                <button id="upload-btn" class="flex items-center justify-center gap-2 px-3 py-2 md:px-4 md:py-2.5 bg-slate-800 text-slate-300 rounded-lg text-sm transition-colors hover:bg-slate-700">
                    <i class="ph ph-upload-simple text-lg"></i> <span class="hidden sm:inline">Yükle</span>
                </button>
                <button id="save-btn" class="flex items-center justify-center gap-2 px-4 py-2 md:px-6 md:py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium transition-colors hover:bg-blue-500 active:bg-blue-700">
                    <i class="ph ph-floppy-disk text-lg"></i> Kaydet
                </button>
            </div>
        </div>

        <!-- Editör ve Önizleme Alanı -->
        <div class="flex-1 overflow-y-auto overflow-x-hidden p-3 md:p-6" id="editor-container">
            <!-- Duruma göre JS ile içerik buraya basılacak -->
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Güvenli Anahtar Parçalama (Aynı yapı korundu)
        const k1 = "f3d3a00711c2";
        const k2 = "42d0f85f0247";
        const k3 = "d584929d1551";
        const k4 = "2ddb  firebase-";
        const k5 = "adminsdk-fbsvc";
        const k6 = "@depolama-1270b.iam.gserviceaccount.com";
        const adminSvcKey = k1 + k2 + k3 + k4 + k5 + k6;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'text-manager-pro-html';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State Yönetimi
        let state = {
            user: null,
            documents: [],
            activeDoc: null,
            form: { name: '', content: '', fileType: 'text/plain' },
            isSaving: false
        };

        // DOM Elementleri
        const els = {
            menuBtn: document.getElementById('menu-btn'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('sidebar-overlay'),
            docList: document.getElementById('document-list'),
            docNameInput: document.getElementById('doc-name-input'),
            uploadBtn: document.getElementById('upload-btn'),
            fileInput: document.getElementById('file-input'),
            saveBtn: document.getElementById('save-btn'),
            editorContainer: document.getElementById('editor-container'),
            mobileNewBtn: document.getElementById('mobile-new-btn'),
            desktopNewBtn: document.getElementById('desktop-new-btn'),
            toastContainer: document.getElementById('toast-container')
        };

        // Bildirim Sistemi (Toast)
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-red-500/10 border-red-500/50 text-red-400' : 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400';
            const icon = type === 'error' ? 'ph-warning-circle' : 'ph-check-circle';
            
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 border rounded-xl shadow-lg backdrop-blur-md pointer-events-auto ${colors}`;
            toast.innerHTML = `<i class="ph ${icon} text-xl"></i><span class="text-sm font-medium">${message}</span>`;
            
            els.toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Mobil Menü Kontrolü
        function toggleSidebar(forceClose = false) {
            const isOpen = !els.sidebar.classList.contains('sidebar-closed');
            if (isOpen || forceClose) {
                els.sidebar.classList.add('sidebar-closed');
                els.overlay.classList.add('hidden');
            } else {
                els.sidebar.classList.remove('sidebar-closed');
                els.overlay.classList.remove('hidden');
            }
        }

        els.menuBtn.addEventListener('click', () => toggleSidebar());
        els.overlay.addEventListener('click', () => toggleSidebar(true));

        // Firebase Auth Başlatma
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Kimlik doğrulama hatası:", error);
                showToast("Bağlantı hatası", "error");
            }
        }

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            if (user) loadDocuments();
        });

        // Veri Çekme
        function loadDocuments() {
            if (!state.user) return;
            const docsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'text_data');
            
            onSnapshot(docsRef, (snapshot) => {
                state.documents = [];
                snapshot.forEach((doc) => state.documents.push({ id: doc.id, ...doc.data() }));
                state.documents.sort((a, b) => b.updatedAt - a.updatedAt);
                renderSidebar();
            }, (error) => {
                showToast("Veriler yüklenemedi", "error");
            });
        }

        // Yeni Belge Başlatma
        function handleNew() {
            state.activeDoc = null;
            state.form = { name: '', content: '', fileType: 'text/plain' };
            renderMain();
            toggleSidebar(true); // Mobilde menüyü kapat
        }

        els.mobileNewBtn.addEventListener('click', handleNew);
        els.desktopNewBtn.addEventListener('click', handleNew);

        // Belge Seçme
        window.selectDoc = function(id) {
            const docData = state.documents.find(d => d.id === id);
            if (docData) {
                state.activeDoc = docData;
                state.form = { name: docData.name, content: docData.content || '', fileType: docData.fileType || 'text/plain' };
                renderMain();
                renderSidebar(); // Aktif rengi güncellemek için
                toggleSidebar(true);
            }
        };

        // Belge Silme
        window.deleteDoc = async function(id, event) {
            event.stopPropagation();
            if (!state.user || !confirm("Bu belgeyi silmek istediğinize emin misiniz?")) return;
            
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'text_data', id));
                if (state.activeDoc && state.activeDoc.id === id) handleNew();
                showToast("Belge silindi");
            } catch (error) {
                showToast("Silinemedi", "error");
            }
        };

        // Belge Kaydetme
        els.saveBtn.addEventListener('click', async () => {
            if (!state.user) return;
            const nameVal = els.docNameInput.value.trim();
            
            // Eğer metin editörü aktifse güncel içeriği al
            const textArea = document.getElementById('text-editor');
            if (textArea) state.form.content = textArea.value;

            if (!nameVal) {
                showToast("Lütfen bir isim verin", "error");
                return;
            }

            // Metin uzunluğu veya base64 boyutu kontrolü (Firestore limiti önlemi)
            if (state.form.content.length > 800000) {
                showToast("Dosya boyutu çok büyük (Maks ~800KB)", "error");
                return;
            }

            state.isSaving = true;
            els.saveBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i> Kaydediliyor';
            
            try {
                const documentId = state.activeDoc ? state.activeDoc.id : crypto.randomUUID();
                const docRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'text_data', documentId);
                
                const saveData = {
                    name: nameVal,
                    fileType: state.form.fileType,
                    content: state.form.content,
                    updatedAt: Date.now()
                };
                
                await setDoc(docRef, saveData);
                showToast("Başarıyla kaydedildi");
                
                if (!state.activeDoc) {
                    state.activeDoc = { id: documentId, ...saveData };
                }
            } catch (error) {
                showToast("Kaydedilemedi", "error");
            } finally {
                state.isSaving = false;
                els.saveBtn.innerHTML = '<i class="ph ph-floppy-disk text-lg"></i> Kaydet';
            }
        });

        // Dosya Yükleme İşlemleri
        els.uploadBtn.addEventListener('click', () => els.fileInput.click());
        
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 800 * 1024) {
                showToast("Dosya çok büyük. Maksimum 800KB yüklenebilir.", "error");
                e.target.value = '';
                return;
            }

            const isText = file.type === 'text/plain' || file.name.endsWith('.txt');
            const reader = new FileReader();

            reader.onload = (evt) => {
                state.form.name = file.name;
                state.form.content = evt.target.result;
                state.form.fileType = file.type || (isText ? 'text/plain' : 'application/octet-stream');
                state.activeDoc = null; // Yeni dosya olarak işaretle
                
                renderMain();
                showToast("Dosya okundu. Lütfen kaydedin.");
            };

            if (isText) {
                reader.readAsText(file);
            } else {
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        // Arayüz Çizimi: Sol Menü
        function renderSidebar() {
            if (state.documents.length === 0) {
                els.docList.innerHTML = `
                    <div class="text-center p-6 border border-slate-800 border-dashed rounded-xl mt-4">
                        <i class="ph ph-file-dashed text-3xl text-slate-600 mb-2"></i>
                        <p class="text-sm text-slate-500">Henüz kayıt yok.</p>
                    </div>`;
                return;
            }

            els.docList.innerHTML = state.documents.map(doc => {
                const isActive = state.activeDoc && state.activeDoc.id === doc.id;
                const isRealFile = doc.content && doc.content.startsWith('data:');
                const icon = isRealFile ? 'ph-file-pdf' : 'ph-file-text';
                const iconColor = isRealFile ? 'text-green-400' : 'text-blue-400';
                
                return `
                <div onclick="selectDoc('${doc.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all border ${isActive ? 'bg-blue-900/20 border-blue-500/50' : 'bg-slate-800/30 border-slate-800 hover:bg-slate-800 hover:border-slate-700'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center shrink-0 border border-slate-700">
                            <i class="ph ${icon} ${iconColor} text-lg"></i>
                        </div>
                        <span class="truncate font-medium text-sm text-slate-200">${doc.name}</span>
                    </div>
                    <button onclick="deleteDoc('${doc.id}', event)" class="p-2 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors md:opacity-0 md:group-hover:opacity-100">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
                `;
            }).join('');
        }

        // Arayüz Çizimi: Ana Ekran (Editör/Önizleme)
        function renderMain() {
            els.docNameInput.value = state.form.name;
            const isRealFile = state.form.content && state.form.content.startsWith('data:');
            
            if (!isRealFile) {
                // Metin Editörü Modu
                els.editorContainer.innerHTML = `
                    <div class="h-full flex flex-col bg-slate-900/40 border border-slate-800 rounded-2xl overflow-hidden shadow-inner">
                        <div class="px-4 py-3 bg-slate-900 border-b border-slate-800 flex items-center gap-2">
                            <i class="ph ph-text-aa text-slate-400"></i>
                            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Metin Düzenleyici</span>
                        </div>
                        <textarea id="text-editor" placeholder="Notlarınızı buraya yazın..." class="flex-1 w-full p-4 md:p-6 bg-transparent text-slate-200 resize-none focus:outline-none text-sm md:text-base leading-relaxed">${state.form.content}</textarea>
                    </div>
                `;
            } else {
                // Dosya Önizleme / İndirme Modu
                let previewHtml = '';
                
                if (state.form.fileType === 'application/pdf') {
                    previewHtml = `<iframe src="${state.form.content}" class="w-full h-[50vh] md:h-full rounded-xl bg-white border border-slate-800"></iframe>`;
                } else if (state.form.fileType.startsWith('image/')) {
                    previewHtml = `<div class="w-full h-full flex items-center justify-center bg-slate-900/50 rounded-xl border border-slate-800 p-4">
                        <img src="${state.form.content}" class="max-w-full max-h-[50vh] md:max-h-full object-contain rounded-lg shadow-lg">
                    </div>`;
                } else {
                    previewHtml = `<div class="h-full flex flex-col items-center justify-center text-slate-500 bg-slate-900/30 rounded-xl border border-slate-800 p-8 text-center">
                        <i class="ph ph-file-dashed text-5xl mb-3 opacity-30 text-blue-400"></i>
                        <p class="font-medium text-slate-300">Bu dosya türü için canlı önizleme desteklenmiyor.</p>
                        <p class="text-sm mt-2 opacity-70">Dosyayı cihazınıza indirip görüntüleyebilirsiniz.</p>
                    </div>`;
                }

                els.editorContainer.innerHTML = `
                    <div class="h-full flex flex-col md:flex-row gap-4 md:gap-6">
                        <!-- Dosya Bilgi ve İndirme Kartı -->
                        <div class="w-full md:w-1/3 flex flex-col items-center justify-center border border-slate-800 rounded-2xl bg-slate-900/40 p-6 shrink-0 h-fit">
                            <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mb-4 border border-blue-500/20">
                               <i class="ph ph-download-simple text-4xl text-blue-500"></i>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-2 text-center break-all">${state.form.name || 'İsimsiz Dosya'}</h3>
                            <p class="text-sm text-slate-400 mb-6 text-center">
                                Bu dosya güvenli veritabanı altyapısında saklanmaktadır.
                            </p>
                            <a href="${state.form.content}" download="${state.form.name}" class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all shadow-lg shadow-blue-500/20 font-medium">
                               <i class="ph ph-download-simple text-lg"></i> Cihaza İndir
                            </a>
                        </div>
                        
                        <!-- Önizleme Kartı -->
                        <div class="flex-1 min-h-[300px]">
                            ${previewHtml}
                        </div>
                    </div>
                `;
            }
        }

        // Başlangıç Kurulumu
        renderMain(); // Boş editör ile başlat
        initAuth();

    </script>
</body>
</html>
